      function initOptiCalc() {
        var calcDisplay = document.getElementById("calcDisplay");
        var calcKeys = document.getElementById("calcKeys");
        var receipt = document.getElementById("receipt");
        var receiptItems = ["--- Session Started ---"];
        var displayStr = "";
        var thCanvas = document.getElementById("thCanvas");
        var thScene = document.getElementById("thScene");
        var thSceneNote = document.getElementById("thSceneNote");
        var optiPrintSheet = document.getElementById("optiPrintSheet");
        var lastThicknessParams = null;
        var thicknessViewer = null;

        var keyLayout = ["7", "8", "9", "/", "4", "5", "6", "*", "1", "2", "3", "-", "0", ".", "=", "+"];

        function addReceipt(line) {
          var t = new Date();
          var stamp = t.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
          receiptItems.push("[" + stamp + "] " + line);
          receipt.textContent = receiptItems.join("\n");
          receipt.scrollTop = receipt.scrollHeight;
        }

        function renderDisplay(text) {
          calcDisplay.textContent = text || "0";
        }

        function safeEval(raw) {
          var sanitized = raw.replace(/[^-+*/.0-9()%]/g, "");
          if (!sanitized) return 0;
          var normalized = sanitized.replace(/%/g, "/100");
          return Function("return (" + normalized + ");")();
        }

        function createThickness3DViewer(container, noteEl, fallbackCanvas) {
          var canvas = fallbackCanvas;
          if (!canvas) {
            return null;
          }

          if (container) {
            container.style.display = "none";
          }
          canvas.style.display = "block";

          var lastParams = null;
          var lastDarkMode = false;
          var lastMessage = "Enter lens profile values and click Estimate";

          function applyNoteTheme(isDark) {
            if (!noteEl) return;
            noteEl.style.color = isDark ? "#f4f4f4" : "#334155";
            noteEl.style.background = isDark ? "rgba(0,0,0,0.62)" : "rgba(255,255,255,0.72)";
          }

          function ensureCanvasSize() {
            var cssWidth = Math.max(320, canvas.clientWidth || 420);
            var cssHeight = Math.max(240, Math.round(cssWidth * 0.72));
            var ratio = Math.min(window.devicePixelRatio || 1, 2);
            var pixelWidth = Math.round(cssWidth * ratio);
            var pixelHeight = Math.round(cssHeight * ratio);

            if (canvas.width !== pixelWidth || canvas.height !== pixelHeight) {
              canvas.width = pixelWidth;
              canvas.height = pixelHeight;
            }
          }

          function drawPlaceholder(ctx, isDark, message) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = isDark ? "#050505" : "#f8fafc";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = isDark ? "rgba(255,255,255,0.2)" : "rgba(15,23,42,0.16)";
            ctx.setLineDash([4, 4]);
            ctx.strokeRect(
              Math.round(canvas.width * 0.03),
              Math.round(canvas.height * 0.05),
              Math.round(canvas.width * 0.94),
              Math.round(canvas.height * 0.9)
            );
            ctx.setLineDash([]);

            ctx.fillStyle = isDark ? "#ffffff" : "#334155";
            ctx.font = Math.round(canvas.width * 0.03) + "px Segoe UI";
            ctx.fillText(message || "Enter lens profile values and click Estimate", Math.round(canvas.width * 0.06), Math.round(canvas.height * 0.12));
          }

          function drawOpticalcProfile(ctx, params, isDark) {
            var maxThickness = Number(params.finalThickness || 0);
            var frameTypeRaw = Number(params.frameType || 0);
            var frameThickMm = (frameTypeRaw === 1.21) ? 1.2 : frameTypeRaw;
            var isPlus = Number(params.power || 0) > 0;

            var isSemi = (frameTypeRaw === 1.21);
            var isZyl = (frameTypeRaw === 2.5);
            var isDrill = (frameThickMm === 0);

            var faceColor = isDark ? "#ffffff" : "#555555";
            var lensColor = isDark ? "rgba(147, 197, 253, 0.26)" : "rgba(0, 150, 255, 0.34)";
            var lensOutline = isDark ? "#bfdbfe" : "#0066cc";
            var frameColor = isDark ? "#e2e8f0" : "#222222";
            var templeColor = isDark ? "#cbd5e1" : "#444444";
            var textColor = isDark ? "#ffffff" : "#000000";
            var warnColor = isDark ? "#ff8080" : "#cc0000";
            var okColor = isDark ? "#93f39f" : "#008800";

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = isDark ? "#050505" : "#f8fafc";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Opticalc drawing coordinates are built for a 400x300 canvas.
            var sx = canvas.width / 400;
            var sy = canvas.height / 300;
            ctx.save();
            ctx.scale(sx, sy);

            ctx.beginPath();
            ctx.moveTo(220, 20);
            ctx.bezierCurveTo(230, 50, 220, 80, 200, 100);
            ctx.bezierCurveTo(220, 120, 240, 140, 240, 160);
            ctx.bezierCurveTo(220, 170, 210, 175, 210, 180);
            ctx.bezierCurveTo(220, 185, 225, 190, 215, 195);
            ctx.bezierCurveTo(210, 198, 205, 200, 210, 205);
            ctx.bezierCurveTo(220, 215, 225, 220, 220, 230);
            ctx.bezierCurveTo(210, 250, 180, 260, 150, 280);
            ctx.strokeStyle = faceColor;
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.ellipse(170, 105, 12, 6, 0, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(175, 105, 3, 0, Math.PI * 2);
            ctx.fillStyle = faceColor;
            ctx.fill();

            var scale = 5;
            var lensThickPx = maxThickness * scale;
            var frameThickPx = frameThickMm * scale;

            var frontX = 225;
            var topY = 75;
            var lensHeight = 90;
            var backX = frontX - lensThickPx;

            ctx.fillStyle = lensColor;
            ctx.strokeStyle = lensOutline;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(frontX, topY);
            ctx.quadraticCurveTo(frontX + 3, topY + lensHeight / 2, frontX, topY + lensHeight);
            ctx.lineTo(backX, topY + lensHeight);
            ctx.quadraticCurveTo(backX - (isPlus ? 8 : 4), topY + lensHeight / 2, backX, topY);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            if (isDrill) {
              ctx.fillStyle = isDark ? lensOutline : "#888888";
              ctx.fillRect(frontX - lensThickPx - 2, topY + 20, lensThickPx + 4, 6);
              ctx.fillStyle = isDark ? "white" : "black";
              ctx.beginPath(); ctx.arc(frontX + 2, topY + 23, 1.5, 0, Math.PI * 2); ctx.fill();
              ctx.beginPath(); ctx.arc(backX - 2, topY + 23, 1.5, 0, Math.PI * 2); ctx.fill();

              ctx.fillStyle = templeColor;
              ctx.fillRect(50, topY + 20, backX - 50, 4);
            } else {
              ctx.fillStyle = frameColor;

              if (isZyl) {
                ctx.beginPath();
                ctx.moveTo(frontX + 0.5, topY - 0.5);
                ctx.lineTo(frontX + 0.5, topY + lensHeight + 0.5);
                ctx.lineTo(frontX - frameThickPx, topY + lensHeight + 0.5);
                ctx.lineTo(frontX - frameThickPx, topY - 0.5);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = templeColor;
                ctx.fillRect(50, topY + 15, frontX - frameThickPx - 50, isDark ? 4 : 6);
              } else if (isSemi) {
                ctx.fillRect(frontX - frameThickPx - 1, topY - 2, lensThickPx + frameThickPx + 2, 4);

                ctx.strokeStyle = frameColor;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(backX, topY + lensHeight + 0.5);
                ctx.lineTo(frontX, topY + lensHeight + 0.5);
                ctx.stroke();

                ctx.fillStyle = templeColor;
                ctx.fillRect(50, topY + 15, backX - 50, isDark ? 4 : 6);
              } else {
                ctx.strokeStyle = frameColor;
                ctx.lineWidth = 1.5;
                ctx.strokeRect(frontX - frameThickPx, topY - 1, frameThickPx + 1, lensHeight + 2);

                ctx.fillStyle = templeColor;
                ctx.fillRect(50, topY + 15, backX - 50, isDark ? 4 : 6);
              }
            }

            var exposedMm = Math.max(0, maxThickness - frameThickMm).toFixed(2);

            ctx.fillStyle = textColor;
            ctx.font = "14px Arial";
            ctx.textAlign = "left";
            ctx.fillText("Max Lens Thickness: " + maxThickness.toFixed(2) + " mm", 15, 25);
            ctx.fillText("Frame Coverage: " + frameThickMm.toFixed(2) + " mm", 15, 45);

            ctx.fillStyle = (exposedMm > 0) ? warnColor : okColor;
            ctx.font = "bold 15px Arial";
            ctx.fillText("Exposed Lens: " + exposedMm + " mm", 15, 68);

            if (exposedMm > 0 && !isDrill) {
              ctx.strokeStyle = ctx.fillStyle;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(frontX - frameThickPx, topY + lensHeight + 10);
              ctx.lineTo(backX, topY + lensHeight + 10);
              ctx.stroke();

              ctx.beginPath();
              ctx.moveTo(frontX - frameThickPx, topY + lensHeight + 5);
              ctx.lineTo(frontX - frameThickPx, topY + lensHeight + 15);
              ctx.moveTo(backX, topY + lensHeight + 5);
              ctx.lineTo(backX, topY + lensHeight + 15);
              ctx.stroke();
            }

            ctx.restore();

            if (noteEl) {
              var label = isPlus ? "Center Thickness (Plus Lens)" : "Edge Thickness (Minus Lens)";
              noteEl.textContent = "Opticalc profile image - " + label + " " + maxThickness.toFixed(2) + " mm";
            }
          }

          function redraw() {
            ensureCanvasSize();
            var ctx = canvas.getContext("2d");
            if (!ctx) return;
            applyNoteTheme(lastDarkMode);

            if (lastParams) {
              drawOpticalcProfile(ctx, lastParams, lastDarkMode);
            } else {
              drawPlaceholder(ctx, lastDarkMode, lastMessage);
            }
          }

          function renderThickness(params, isDark) {
            lastParams = params || null;
            lastDarkMode = !!isDark;
            redraw();
          }

          function showPlaceholder(message, isDark) {
            lastParams = null;
            lastDarkMode = !!isDark;
            lastMessage = message || "Enter lens profile values and click Estimate";
            if (noteEl) {
              noteEl.textContent = "Opticalc profile image ready";
            }
            redraw();
          }

          function captureImage() {
            return canvas.toDataURL("image/png");
          }

          function resize() {
            redraw();
          }

          window.addEventListener("resize", resize);
          showPlaceholder("Enter lens profile values and click Estimate", false);

          return {
            render: renderThickness,
            showPlaceholder: showPlaceholder,
            captureImage: captureImage,
            resize: resize
          };
        }

        function cleanupOptiPrintMode() {
          document.body.classList.remove("opti-print-mode");
          if (optiPrintSheet) {
            optiPrintSheet.innerHTML = "";
            optiPrintSheet.setAttribute("aria-hidden", "true");
          }
        }

        function printOptiReceipt() {
          if (!optiPrintSheet) {
            window.print();
            return;
          }

          var receiptText = receipt ? receipt.textContent.trim() : "";
          var printHtml = "<h2 class=\"opti-print-title\">Session Receipt</h2>" +
            "<pre class=\"opti-print-receipt\">" + escapeHtml(receiptText || "--- Session Started ---") + "</pre>";

          if (lastThicknessParams) {
            var visualDataUrl = "";
            if (thicknessViewer && typeof thicknessViewer.captureImage === "function") {
              visualDataUrl = thicknessViewer.captureImage();
            } else if (thCanvas) {
              visualDataUrl = thCanvas.toDataURL("image/png");
            }
            if (visualDataUrl) {
              printHtml += "<section class=\"opti-print-visual\"><h3>Lens Thickness Picture</h3><img src=\"" + visualDataUrl + "\" alt=\"Lens thickness picture\"></section>";
            }
          }

          optiPrintSheet.innerHTML = printHtml;
          optiPrintSheet.setAttribute("aria-hidden", "false");
          document.body.classList.add("opti-print-mode");
          window.print();
        }

        window.addEventListener("afterprint", cleanupOptiPrintMode);

        thicknessViewer = createThickness3DViewer(thScene, thSceneNote, thCanvas);

        function drawThicknessPlaceholder(message) {
          if (thicknessViewer && typeof thicknessViewer.showPlaceholder === "function") {
            thicknessViewer.showPlaceholder(message, state.isDarkMode);
            return;
          }
          if (!thCanvas) return;
          var ctx = thCanvas.getContext("2d");
          if (!ctx) return;

          ctx.clearRect(0, 0, thCanvas.width, thCanvas.height);
          ctx.fillStyle = state.isDarkMode ? "#050505" : "#f8fafc";
          ctx.fillRect(0, 0, thCanvas.width, thCanvas.height);

          ctx.strokeStyle = state.isDarkMode ? "rgba(255,255,255,0.2)" : "rgba(15,23,42,0.16)";
          ctx.setLineDash([4, 4]);
          ctx.strokeRect(14, 14, thCanvas.width - 28, thCanvas.height - 28);
          ctx.setLineDash([]);

          ctx.fillStyle = state.isDarkMode ? "#ffffff" : "#334155";
          ctx.font = "600 14px Segoe UI";
          ctx.fillText(message || "Enter thickness inputs and click Estimate", 24, 34);
        }

        function drawThicknessVisualizer(params) {
          if (thicknessViewer && typeof thicknessViewer.render === "function") {
            thicknessViewer.render(params, state.isDarkMode);
            return;
          }
          if (!thCanvas || !params) return;
          var ctx = thCanvas.getContext("2d");
          if (!ctx) return;

          var finalThickness = params.finalThickness;
          var power = params.power;
          var frameType = params.frameType;
          var index = params.index;
          var diameter = params.diameter;
          var dec = params.decentration;
          var isPlus = power > 0;

          ctx.clearRect(0, 0, thCanvas.width, thCanvas.height);
          ctx.fillStyle = state.isDarkMode ? "#000000" : "#f8fafc";
          ctx.fillRect(0, 0, thCanvas.width, thCanvas.height);

          var faceColor = state.isDarkMode ? "#ffffff" : "#444444";
          var lensFill = state.isDarkMode ? "rgba(255,255,255,0.18)" : "rgba(100,116,139,0.25)";
          var lensStroke = state.isDarkMode ? "#ffffff" : "#1e293b";
          var frameColor = state.isDarkMode ? "#e2e8f0" : "#0f172a";

          ctx.strokeStyle = faceColor;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(245, 20);
          ctx.bezierCurveTo(262, 50, 254, 80, 228, 102);
          ctx.bezierCurveTo(250, 122, 266, 148, 262, 168);
          ctx.bezierCurveTo(248, 176, 236, 184, 234, 195);
          ctx.bezierCurveTo(247, 206, 250, 216, 236, 224);
          ctx.bezierCurveTo(210, 238, 182, 244, 158, 250);
          ctx.stroke();

          ctx.beginPath();
          ctx.ellipse(196, 96, 13, 7, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(199, 96, 2.4, 0, Math.PI * 2);
          ctx.fillStyle = faceColor;
          ctx.fill();

          var lensScale = 5;
          var lensThickPx = Math.max(3, finalThickness * lensScale);
          var frontX = 286;
          var topY = 72;
          var lensHeight = 108;
          var backX = frontX - lensThickPx;

          ctx.fillStyle = lensFill;
          ctx.strokeStyle = lensStroke;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(frontX, topY);
          ctx.quadraticCurveTo(frontX + 4, topY + lensHeight / 2, frontX, topY + lensHeight);
          ctx.lineTo(backX, topY + lensHeight);
          ctx.quadraticCurveTo(backX - (isPlus ? 10 : 5), topY + lensHeight / 2, backX, topY);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          var isDrill = frameType === 0;
          if (isDrill) {
            ctx.fillStyle = frameColor;
            ctx.fillRect(backX - 2, topY + 24, lensThickPx + 5, 6);
            ctx.beginPath();
            ctx.arc(frontX + 2, topY + 27, 1.6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(backX - 2, topY + 27, 1.6, 0, Math.PI * 2);
            ctx.fill();
          } else {
            var frameThicknessPx = frameType === 1.21 ? 4 : 7;
            ctx.fillStyle = frameColor;
            ctx.fillRect(frontX - frameThicknessPx, topY - 5, frameThicknessPx * 2, lensHeight + 10);
          }

          ctx.fillStyle = frameColor;
          ctx.fillRect(64, topY + 24, frontX - 64, 4);

          ctx.fillStyle = state.isDarkMode ? "#ffffff" : "#0f172a";
          ctx.font = "600 13px Segoe UI";
          ctx.fillText("Estimated Edge Thickness: " + finalThickness.toFixed(2) + "mm", 16, 24);
          ctx.font = "12px Segoe UI";
          ctx.fillText("Power " + power.toFixed(2) + "D | Index " + index.toFixed(2) + " | Dia " + diameter.toFixed(1) + "mm | Dec " + dec.toFixed(1) + "mm", 16, 44);
        }

        keyLayout.forEach(function (key) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "key" + ((/[/*+\-%]/.test(key) || key === "=") ? " op" : "") + (key === "=" ? " eq" : "");
          btn.textContent = key === "/" ? "÷" : key === "*" ? "×" : key;
          btn.addEventListener("click", function () {
            if (key === "C") {
              displayStr = "";
              renderDisplay(displayStr);
              return;
            }
            if (key === "=") {
              try {
                var result = safeEval(displayStr);
                addReceipt(displayStr + " = " + result);
                displayStr = String(result);
                renderDisplay(displayStr);
              } catch (_e) {
                displayStr = "Error";
                renderDisplay(displayStr);
              }
              return;
            }
            if (displayStr === "Error") {
              displayStr = "";
            }
            displayStr += key;
            renderDisplay(displayStr);
          });
          calcKeys.appendChild(btn);
        });

        document.getElementById("calcClear").addEventListener("click", function () {
          displayStr = "";
          renderDisplay(displayStr);
        });

        document.querySelectorAll("[data-retail]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var mul = Number(btn.getAttribute("data-retail"));
            try {
              var base = Number(safeEval(displayStr));
              if (!Number.isFinite(base)) return;
              var total = Number((base * mul).toFixed(2));
              var label = "Retail (x" + mul.toFixed(1) + ")";
              var extra = Math.abs(total - base).toFixed(2);
              displayStr = "Before: $" + base + "\n" + label + ": $" + extra + "\nTotal: $" + total.toFixed(2);
              calcDisplay.textContent = displayStr;
              addReceipt(base + " " + label + " => " + total.toFixed(2));
            } catch (_e) {
              displayStr = "Error";
              renderDisplay(displayStr);
            }
          });
        });

        document.getElementById("receiptClear").addEventListener("click", function () {
          receiptItems = ["--- Session Started ---"];
          receipt.textContent = receiptItems.join("\n");
        });

        document.getElementById("receiptPrint").addEventListener("click", function () {
          printOptiReceipt();
        });

        document.getElementById("decCalc").addEventListener("click", function () {
          var a = Number(document.getElementById("decFrameA").value);
          var b = Number(document.getElementById("decBridge").value);
          var pd = Number(document.getElementById("decPd").value);
          if (!Number.isFinite(a) || !Number.isFinite(b) || !Number.isFinite(pd)) return;
          var framePd = a + b;
          var dec = (framePd - pd) / 2;
          document.getElementById("decResult").textContent = "Decentration / eye: " + dec.toFixed(2) + " mm";
          document.getElementById("mbsFramePd").value = framePd.toFixed(1);
          document.getElementById("mbsPatientPd").value = pd.toFixed(1);
          document.getElementById("thDec").value = Math.abs(dec).toFixed(2);
          addReceipt("Decentration = " + dec.toFixed(2) + "mm");
        });

        document.getElementById("mbsCalc").addEventListener("click", function () {
          var ed = Number(document.getElementById("mbsEd").value);
          var framePd = Number(document.getElementById("mbsFramePd").value);
          var patientPd = Number(document.getElementById("mbsPatientPd").value);
          if (!Number.isFinite(ed) || !Number.isFinite(framePd) || !Number.isFinite(patientPd)) return;
          var mbs = ed + (framePd - patientPd) + 2;
          document.getElementById("mbsResult").textContent = "MBS: " + mbs.toFixed(1) + " mm";
          addReceipt("MBS = " + mbs.toFixed(1) + "mm");
        });

        function estimateThickness(logReceipt) {
          var n = Number(document.getElementById("thIndex").value);
          var p = Number(document.getElementById("thPower").value);
          var d = Number(document.getElementById("thDiameter").value);
          var dec = Number(document.getElementById("thDec").value || 0);
          var mt = Number(document.getElementById("thMin").value);
          var frameType = Number(document.getElementById("thFrameType").value);
          if (!Number.isFinite(n) || !Number.isFinite(p) || !Number.isFinite(d) || !Number.isFinite(mt)) {
            document.getElementById("thResult").textContent = "";
            drawThicknessPlaceholder("Enter lens profile values first");
            return false;
          }
          var r = (d / 2) + Math.abs(dec);
          var sag = (Math.pow(r, 2) * Math.abs(p)) / (2000 * (n - 1));
          var finalThickness = sag + mt;
          document.getElementById("thResult").textContent = "Estimated edge thickness: " + finalThickness.toFixed(2) + " mm";
          if (logReceipt !== false) {
            addReceipt("Thickness est. = " + finalThickness.toFixed(2) + "mm");
          }

          lastThicknessParams = {
            finalThickness: finalThickness,
            power: p,
            frameType: frameType,
            index: n,
            diameter: d,
            decentration: dec
          };
          drawThicknessVisualizer(lastThicknessParams);
          return true;
        }

        document.getElementById("thCalc").addEventListener("click", function () {
          estimateThickness(true);
        });

        ["thIndex", "thFrameType", "thPower", "thDiameter", "thDec", "thMin"].forEach(function (id) {
          var field = document.getElementById(id);
          if (!field) return;
          var eventName = field.tagName === "SELECT" ? "change" : "input";
          field.addEventListener(eventName, function () {
            estimateThickness(false);
          });
        });

        estimateThickness(false);

        window.__redrawThicknessVisualizer = function () {
          if (thicknessViewer && typeof thicknessViewer.resize === "function") {
            thicknessViewer.resize();
          }
          if (lastThicknessParams) {
            drawThicknessVisualizer(lastThicknessParams);
          } else {
            drawThicknessPlaceholder();
          }
        };

        window.__resizeThickness3D = function () {
          if (thicknessViewer && typeof thicknessViewer.resize === "function") {
            thicknessViewer.resize();
          }
        };

        receipt.textContent = receiptItems.join("\n");
        renderDisplay(displayStr);
        drawThicknessPlaceholder();
      }

      function init() {
        state.isDarkMode = localStorage.getItem("pal-dark-mode") === "1";
        applyTheme();
        renderCategoryNav();
        renderContent();
        bindGlobalEvents();
        initOptiCalc();

        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("./public/sw.js").catch(function () { return; });
          });
        }
      }

      init();
    })();
  </script>
</body>

</html>
