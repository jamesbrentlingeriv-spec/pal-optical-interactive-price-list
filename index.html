<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAL Optical Interactive Price List</title>
  <link rel="manifest" href="./public/manifest.json">
  <meta name="theme-color" content="#3f3f46">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="./favicon.ico">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #edf1f5;
      --panel: #f7f9fc;
      --panel-soft: #e3e8ef;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --accent: #6b7280;
      --accent-strong: #4b5563;
      --good: #9ca3af;
      --shadow: 0 10px 40px rgba(15, 23, 42, 0.12);
      --rainbow-flow: linear-gradient(120deg, #000000, #111111, #1a1a1a, #050505, #000000, #050505, #1a1a1a, #000000);
      --sapphire-flow: linear-gradient(115deg, #031525, #0b3d91, #1683ff, #59b7ff, #0e5fca, #062b5b, #031525);
    }

    body.dark {
      --bg: #090807;
      --panel: #1d1917;
      --panel-soft: #282320;
      --text: #f6eee2;
      --muted: #a1a1aa;
      --line: #3f3f46;
      --accent: #a1a1aa;
      --accent-strong: #d4d4d8;
      --good: #d4d4d8;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.42);
      --rainbow-flow: linear-gradient(120deg, #ffffff, #f5f5f5, #e5e5e5, #ffffff, #fafafa, #ffffff, #e5e5e5, #ffffff);
      --sapphire-flow: linear-gradient(115deg, #03111e, #0b2e70, #1268d7, #54aaf7, #0f5bc1, #08264b, #03111e);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      transition: background 0.25s ease, color 0.25s ease;
    }

    body.dark {
      background: #090807;
      color: #f6eee2;
    }

    body.dark p,
    body.dark span,
    body.dark h1,
    body.dark h2,
    body.dark h3,
    body.dark h4,
    body.dark h5,
    body.dark h6,
    body.dark label,
    body.dark li,
    body.dark small,
    body.dark strong,
    body.dark input,
    body.dark textarea,
    body.dark select,
    body.dark button {
      color: #f6eee2;
    }

    body.dark input::placeholder,
    body.dark textarea::placeholder {
      color: #baaa98;
      opacity: 0.85;
    }

    @keyframes rainbow-flow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes sapphire-flow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      backdrop-filter: blur(5px);
      border-bottom: 1px solid var(--line);
      padding: 7px 10px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-video {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .logo-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.18rem;
      line-height: 1.1;
      letter-spacing: 0.05em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .brand p {
      margin: 2px 0 0;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .search-wrap {
      position: relative;
      max-width: 620px;
      width: 100%;
      justify-self: center;
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 999px;
      background:
        linear-gradient(var(--panel-soft), var(--panel-soft)) padding-box,
        var(--rainbow-flow) border-box;
      background-size: 100% 100%, 300% 300%;
      animation: rainbow-flow 8s linear infinite;
      color: var(--text);
      padding: 8px 14px 8px 38px;
      outline: none;
      font-size: 0.84rem;
      font-weight: 500;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.95rem;
      pointer-events: none;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn,
    .chip,
    .icon-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn {
      padding: 7px 11px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .btn.primary {
      background: var(--panel);
      border-color: transparent;
      color: var(--text);
      font-weight: 600;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      font-size: 1rem;
    }

    .topbar,
    .logo-video,
    .btn,
    .chip,
    .icon-btn,
    .nav-item,
    .card,
    .table,
    .before-after,
    .media,
    .modal-card,
    .opti-block,
    .display,
    .key,
    .result,
    .receipt,
    .th-visual-wrap,
    .edu-tile,
    .edu-modal-card,
    .edu-color-btn,
    .lens-cutaway,
    .scene-card,
    .seg-lens {
      position: relative;
      isolation: isolate;
      border-color: transparent !important;
    }

    .topbar::before,
    .logo-video::before,
    .btn::before,
    .chip::before,
    .icon-btn::before,
    .nav-item::before,
    .card::before,
    .table::before,
    .before-after::before,
    .media::before,
    .modal-card::before,
    .opti-block::before,
    .display::before,
    .key::before,
    .result::before,
    .receipt::before,
    .th-visual-wrap::before,
    .edu-tile::before,
    .edu-modal-card::before,
    .edu-color-btn::before,
    .lens-cutaway::before,
    .scene-card::before,
    .seg-lens::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: var(--rainbow-flow);
      background-size: 300% 300%;
      animation: rainbow-flow 11s linear infinite;
      opacity: 0.9;
      pointer-events: none;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .table::before {
      border-radius: 14px;
    }

    .btn.primary {
      color: var(--text);
    }

    body.dark .switch.active,
    body.dark .key.eq {
      color: #ffffff;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100dvh - 56px);
      min-height: 0;
      overflow: hidden;
    }

    .sidebar {
      background: color-mix(in srgb, var(--panel) 82%, var(--bg));
      padding: 8px;
      height: 100%;
      overflow-y: auto;
    }

    .sidebar {
      scrollbar-width: thin;
    }

    body.dark .sidebar {
      scrollbar-color: #4a433d #1b1715;
    }

    body.dark .sidebar::-webkit-scrollbar {
      width: 10px;
    }

    body.dark .sidebar::-webkit-scrollbar-track {
      background: #1b1715;
    }

    body.dark .sidebar::-webkit-scrollbar-thumb {
      background: #4a433d;
      border-radius: 999px;
      border: 2px solid #1b1715;
    }

    body.dark .sidebar::-webkit-scrollbar-thumb:hover {
      background: #5c544d;
    }

    .side-title {
      margin: 4px 8px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .nav-item {
      text-align: left;
      border-radius: 14px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      padding: 11px 44px 11px 12px;
      min-height: 52px;
      font-size: 0.96rem;
      letter-spacing: 0.02em;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
    }

    .nav-item span:first-child {
      min-width: 0;
      flex: 1 1 auto;
    }

    .nav-item span:last-child {
      font-size: 1.15rem;
      line-height: 1;
      opacity: 0.9;
      flex: 0 0 auto;
      margin-left: 16px;
    }

    .nav-item.active {
      background: var(--panel);
      border-color: var(--line);
      font-weight: 600;
      box-shadow: none;
    }

    .nav-item::after {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff2b2b;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
    }

    .nav-item.active::after {
      opacity: 1;
    }

    .nav-item::before {
      padding: 1px;
      animation: none;
      background: var(--cat-outline, var(--rainbow-flow));
      background-size: 100% 100%;
      opacity: 0;
    }

    .nav-item.active::before {
      padding: 3px;
      opacity: 1;
      background: var(--rainbow-flow);
      background-size: 320% 320%;
      animation: rainbow-flow 2.4s linear infinite;
    }

    .nav-list .nav-item:nth-child(6n + 1) {
      --cat-outline: var(--rainbow-flow);
    }

    .nav-list .nav-item:nth-child(6n + 2) {
      --cat-outline: var(--rainbow-flow);
    }

    .nav-list .nav-item:nth-child(6n + 3) {
      --cat-outline: var(--rainbow-flow);
    }

    .nav-list .nav-item:nth-child(6n + 4) {
      --cat-outline: var(--rainbow-flow);
    }

    .nav-list .nav-item:nth-child(6n + 5) {
      --cat-outline: var(--rainbow-flow);
    }

    .nav-list .nav-item:nth-child(6n + 6) {
      --cat-outline: var(--rainbow-flow);
    }

    .main {
      min-width: 0;
      height: 100%;
      overflow-y: auto;
      padding: 12px 22px 16px;
    }

    #contentArea {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    #mobileCategories {
      width: min(1120px, 100%);
      margin-left: auto;
      margin-right: auto;
    }

    .mobile-cats {
      display: none;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 12px;
      padding-bottom: 4px;
    }

    .chip {
      white-space: nowrap;
      font-size: 0.76rem;
      font-weight: 600;
      padding: 7px 12px;
      background: transparent;
      border-color: transparent;
    }

    .chip.active {
      background: var(--panel);
      color: var(--text);
      box-shadow: none;
      padding-left: 18px;
    }

    .chip::before {
      opacity: 0;
    }

    .chip.active::before {
      padding: 3px;
      opacity: 1;
      background: var(--rainbow-flow);
      background-size: 320% 320%;
      animation: rainbow-flow 2.4s linear infinite;
    }

    .chip.active::after {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ff2b2b;
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .card {
      background: color-mix(in srgb, var(--panel) 96%, transparent);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: none;
    }

    .card::before {
      padding: 3px;
      background: var(--rainbow-flow);
      background-size: 320% 320%;
      animation: rainbow-flow 2.4s linear infinite;
    }

    .hero {
      padding: 16px;
      margin-bottom: 10px;
      animation: fade-up 0.28s ease;
    }

    .hero-kicker {
      margin: 0 0 8px;
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
      color: #6b7280;
    }

    .hero h2 {
      margin: 0;
      font-size: 2.8rem;
      line-height: 0.95;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.45;
      max-width: 780px;
      font-size: 1.06rem;
      font-weight: 500;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .table thead th {
      text-align: left;
      font-size: 0.78rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--muted);
      background: #dbe2ea;
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      font-weight: 600;
    }

    .table thead th:last-child {
      text-align: right;
      width: 140px;
    }

    .table tbody td {
      border-top: 1px solid var(--line);
      padding: 8px 10px;
      vertical-align: top;
    }

    .table tbody tr:hover {
      background: #e9f6ff;
    }

    .table tbody tr:nth-child(6n) {
      background: #e4f2fb;
    }

    body.dark .topbar {
      background: color-mix(in srgb, #1f1a17 94%, #090807);
    }

    body.dark .sidebar {
      background: #1b1715;
    }

    body.dark .side-title {
      color: #8f7e6a;
    }

    body.dark .search-wrap input {
      background: linear-gradient(#26211e, #26211e) padding-box,
        linear-gradient(110deg, #34302c, #25211e) border-box;
      animation: none;
    }

    body.dark .btn,
    body.dark .chip,
    body.dark .icon-btn {
      background: #26211e;
      border-color: #3a322d;
    }

    body.dark .card,
    body.dark .table {
      background: #1d1917;
    }

    body.dark .table thead th {
      background: #221d1a;
      color: #958775;
      border-bottom-color: #352e28;
    }

    body.dark .table tbody td {
      border-top-color: #352e28;
    }

    body.dark .table tbody tr:hover {
      background: #2a2421;
    }

    body.dark .table tbody tr:nth-child(6n) {
      background: #26211e;
    }

    body.dark .hero-kicker {
      color: #d4d4d8;
    }

    body.dark .nav-list .nav-item {
      --cat-outline: var(--rainbow-flow);
      color: #f6eee2;
    }

    body.dark .nav-item.active,
    body.dark .chip.active {
      background: #25201d;
    }

    body.dark .item-name {
      color: #ffffff;
    }

    body.dark .item-desc {
      color: #b7b8bd;
    }

    .item-name {
      font-weight: 600;
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .item-desc {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.2;
    }

    .item-price {
      text-align: right;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 1.02rem;
      letter-spacing: 0.01em;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .search-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .search-header h3 {
      margin: 0;
      font-size: 1.2rem;
    }

    .edu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .edu-card {
      padding: 16px;
    }

    .edu-card h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .edu-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.42;
    }

    .media {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #000;
      margin-top: 12px;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .switches {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .switch {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--text);
      font-size: 0.74rem;
      font-weight: 600;
      padding: 6px 10px;
      cursor: pointer;
    }

    .switch.active {
      background: var(--good);
      color: #07210f;
      border-color: transparent;
    }

    .before-after {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin-top: 12px;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .before-after img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .before-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      width: 50%;
    }

    .before-label,
    .after-label {
      position: absolute;
      bottom: 10px;
      z-index: 2;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border-radius: 999px;
      padding: 4px 8px;
    }

    .before-label {
      left: 10px;
    }

    .after-label {
      right: 10px;
    }

    .ba-range {
      width: 100%;
      margin-top: 8px;
    }

    .edu-library {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .edu-tile {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 14px;
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, border-color 0.2s ease;
      display: grid;
      gap: 8px;
    }

    .edu-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      display: grid;
      place-items: center;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      font-weight: 700;
      color: var(--muted);
    }

    .edu-title {
      margin: 0;
      font-size: 1rem;
    }

    .edu-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.83rem;
      line-height: 1.4;
    }

    .edu-link {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .edu-modal {
      position: fixed;
      inset: 0;
      z-index: 85;
      background: rgba(2, 6, 23, 0.58);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .edu-modal.open {
      display: flex;
    }

    .edu-modal-card {
      width: min(1200px, 97vw);
      max-height: 92vh;
      overflow: auto;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      animation: fade-up 0.2s ease;
    }

    .edu-modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 520px;
    }

    .edu-visual-pane,
    .edu-copy-pane {
      padding: 16px;
    }

    .edu-visual-pane {
      border-right: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel-soft) 84%, transparent);
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .edu-copy-pane {
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .edu-note {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
      color: var(--muted);
      padding: 10px;
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .edu-benefits {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .edu-benefits li {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
      padding: 8px 10px;
      font-size: 0.83rem;
      color: var(--text);
      line-height: 1.35;
    }

    .edu-colors {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .edu-color-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .edu-color-btn.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 14%, var(--panel));
    }

    .edu-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.12);
    }

    .edu-overlay {
      position: absolute;
      inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .edu-water,
    .edu-smudge {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .edu-water {
      background-image: radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.6) 0 4px, transparent 5px),
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.4) 0 6px, transparent 7px),
        radial-gradient(circle at 75% 65%, rgba(255, 255, 255, 0.35) 0 8px, transparent 9px);
      opacity: 0.5;
    }

    .edu-smudge {
      background-image: radial-gradient(circle at 30% 35%, rgba(255, 255, 255, 0.58) 0%, transparent 44%),
        radial-gradient(circle at 70% 60%, rgba(255, 255, 255, 0.55) 0%, transparent 38%);
      filter: blur(10px);
      opacity: 0.45;
    }

    .lens-cutaway {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .lens-row {
      display: grid;
      gap: 8px;
    }

    .lens-row-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 700;
    }

    .lens-shell {
      height: 54px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel-soft) 80%, transparent);
      display: grid;
      align-items: center;
      overflow: hidden;
    }

    .lens-profile {
      height: 100%;
      width: 100%;
      border-left: 12px solid rgba(15, 23, 42, 0.16);
      border-right: 12px solid rgba(15, 23, 42, 0.16);
      border-radius: 999px;
    }

    .lens-profile.thin {
      border-left-width: 4px;
      border-right-width: 4px;
      border-color: rgba(5, 150, 105, 0.5);
      background: rgba(16, 185, 129, 0.1);
    }

    .lens-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .lens-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel-soft) 55%, var(--panel));
      padding: 10px;
      display: grid;
      gap: 9px;
      align-content: start;
    }

    .lens-card-title {
      margin: 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      font-weight: 700;
    }

    .lens-face {
      width: 100%;
      max-width: 180px;
      aspect-ratio: 1/1;
      margin: 0 auto;
      border-radius: 50%;
      position: relative;
      border: 1px solid rgba(148, 163, 184, 0.65);
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.18) 42%, rgba(148, 163, 184, 0.16) 72%, rgba(15, 23, 42, 0.1) 100%),
        linear-gradient(150deg, rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.12));
      box-shadow:
        inset 0 0 12px rgba(255, 255, 255, 0.4),
        inset 0 -10px 26px rgba(15, 23, 42, 0.16),
        0 12px 24px rgba(15, 23, 42, 0.16);
    }

    .lens-face::before {
      content: "";
      position: absolute;
      left: 22%;
      top: 16%;
      width: 54%;
      height: 22%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      filter: blur(8px);
      transform: rotate(-18deg);
    }

    .lens-face-enhanced {
      border-color: rgba(156, 163, 175, 0.75);
      box-shadow:
        inset 0 0 10px rgba(255, 255, 255, 0.45),
        inset 0 -8px 18px rgba(75, 85, 99, 0.22),
        0 10px 22px rgba(75, 85, 99, 0.2);
    }

    .lens-edge-track {
      height: 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 70%, transparent);
      overflow: hidden;
    }

    .lens-side-view {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel-soft) 46%, var(--panel));
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .lens-side-label {
      margin: 0;
      font-size: 0.64rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }

    .lens-side-svg {
      width: 100%;
      max-width: 210px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .lens-side-note {
      margin: 0;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }

    .lens-side-view.standard {
      color: #6b7280;
    }

    .lens-side-view.enhanced {
      color: #d1d5db;
    }

    body.dark .lens-side-view {
      background: #231e1b;
    }

    body.dark .lens-side-view.standard {
      color: #8f98a7;
    }

    body.dark .lens-side-view.enhanced {
      color: #f2f4f7;
    }

    .lens-edge-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(30, 41, 59, 0.5), rgba(100, 116, 139, 0.8));
    }

    .lens-edge-fill.thin {
      background: rgba(156, 163, 175, 0.9);
    }

    .lens-mm {
      margin: 0;
      font-size: 0.78rem;
      color: var(--text);
      text-align: center;
      font-weight: 600;
    }

    .lens-delta {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 0.8rem;
      line-height: 1.4;
      color: var(--muted);
      background: color-mix(in srgb, var(--panel-soft) 55%, transparent);
    }

    .scene-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .scene-card {
      position: relative;
      border-radius: 12px;
      border: 1px solid var(--line);
      overflow: hidden;
      min-height: 280px;
      background: #000;
    }

    .scene-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.96);
    }

    .scene-corridor {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0.05) 40%, rgba(0, 0, 0, 0.32));
      clip-path: polygon(34% 0%, 66% 0%, 58% 100%, 42% 100%);
    }

    .scene-corridor.premium {
      clip-path: polygon(20% 0%, 80% 0%, 70% 100%, 30% 100%);
    }

    .scene-zone,
    .scene-title {
      position: absolute;
      z-index: 2;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.58);
      color: #fff;
      font-size: 0.64rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 7px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-weight: 700;
    }

    .scene-title {
      top: 8px;
      left: 8px;
      letter-spacing: 0.05em;
      font-size: 0.62rem;
    }

    .scene-zone.top {
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
    }

    .scene-zone.mid {
      top: 48%;
      left: 50%;
      transform: translateX(-50%);
    }

    .scene-zone.bottom {
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
    }

    .seg-lens {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      min-height: 310px;
      background: #000;
    }

    .seg-lens img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .seg-row {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.45);
      border-bottom: 1px solid rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(7px);
      background: rgba(0, 0, 0, 0.12);
      color: #fff;
      font-size: 0.64rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      display: grid;
      place-items: center;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .seg-row.distance {
      top: 0;
      height: 48%;
    }

    .seg-row.intermediate {
      top: 48%;
      height: 28%;
    }

    .seg-row.near {
      bottom: 0;
      height: 24%;
    }

    .seg-row.blur-strong {
      backdrop-filter: blur(13px);
      background: rgba(0, 0, 0, 0.28);
      color: rgba(255, 255, 255, 0.68);
      font-style: italic;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 80;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(1060px, 96vw);
      max-height: 92vh;
      overflow: auto;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      animation: fade-up 0.22s ease;
    }

    .modal-head {
      position: sticky;
      top: 0;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .opti-calc {
      width: min(1120px, 90vw);
      max-height: min(860px, 94vh);
      border-radius: 28px;
      background: #fbfbfd;
      border: 1px solid #d8dee7;
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.2);
      color: #0f172a;
      overflow: auto;
    }

    .opti-calc .modal-head {
      position: sticky;
      top: 0;
      background: #fbfbfd;
      border-bottom: 1px solid #e3e7ee;
      padding: 20px 28px;
      z-index: 3;
    }

    .opti-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .opti-title-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      color: #111111;
    }

    .opti-calc .modal-head h3 {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #111111;
    }

    .opti-calc .icon-btn {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      border-radius: 999px;
      color: #111111;
      font-size: 1.4rem;
    }

    .opti {
      padding: 16px;
      display: grid;
      gap: 14px;
      grid-template-columns: minmax(360px, 0.98fr) minmax(320px, 0.92fr);
      background: #fbfbfd;
    }

    .opti-column {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .opti-block {
      border: 1px solid #eceff4;
      border-radius: 20px;
      padding: 14px;
      background: #f5f6fa;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .opti-heading {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9099ab;
    }

    .opti-heading svg {
      flex: 0 0 auto;
      color: #111111;
    }

    .calc-shell {
      border-radius: 18px;
      background: #eceff5;
      padding: 14px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .display {
      width: 100%;
      min-height: 86px;
      border: 0;
      border-radius: 16px;
      background: transparent;
      color: #0f172a;
      padding: 10px 4px 8px;
      margin-bottom: 8px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      text-align: right;
    }

    .opti-retail-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .opti-retail-btn,
    .key,
    .opti-action,
    .receipt-mini-btn {
      border-radius: 12px;
      border: 1px solid #dfe5ee;
      background: #ffffff;
      color: #111111;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }

    .opti-retail-btn {
      min-height: 30px;
      padding: 8px 6px;
      font-size: 0.66rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .opti-retail-btn.alert {
      background: #f8e1e6;
      color: #d21935;
      border-color: #f2d4da;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .key {
      min-height: 34px;
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
    }

    .key.op {
      background: #ffffff;
    }

    .key.eq {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .form-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .opti-calc label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.63rem;
      color: #99a2b4;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
    }

    .opti-calc input,
    .opti-calc select,
    .opti-calc textarea {
      width: 100%;
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid #edf1f5;
      background: #ffffff;
      color: #0f172a;
      padding: 10px 12px;
      font-size: 0.85rem;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .opti-calc input:focus,
    .opti-calc select:focus,
    .opti-calc textarea:focus {
      border-color: #c7d0db;
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.08);
    }

    .opti-hidden {
      display: none;
    }

    .opti-action {
      width: 100%;
      min-height: 28px;
      margin-top: 12px;
      padding: 9px 14px;
      border-radius: 9px;
      background: #000000;
      color: #ffffff;
      border-color: #000000;
      font-size: 0.73rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .result {
      margin-top: 8px;
      min-height: 24px;
      border: 0;
      background: transparent;
      padding: 0;
      font-size: 0.79rem;
      color: #475569;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      line-height: 1.4;
    }

    .opti-block-highlight {
      box-shadow: inset 3px 3px 0 #ffaf08, inset -3px -3px 0 #39df49;
      background: #ffffff;
    }

    .opti-block-profile .result {
      margin-top: 10px;
      font-weight: 700;
    }

    .th-visual-wrap {
      margin-top: 10px;
      border: 1px solid #e9edf3;
      border-radius: 16px;
      background: #ffffff;
      padding: 8px;
      min-height: 210px;
      position: relative;
      overflow: hidden;
    }

    .th-scene {
      width: 100%;
      height: 270px;
      border-radius: 12px;
      background: #ffffff;
      cursor: grab;
    }

    .th-scene:active {
      cursor: grabbing;
    }

    .th-scene canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      border-radius: 12px;
    }

    .th-scene-note {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 2;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      letter-spacing: 0.02em;
      color: #334155;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(148, 163, 184, 0.35);
      pointer-events: none;
    }

    .th-canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 12px;
      border: 0;
      background: #ffffff;
    }

    .receipt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .receipt-header .opti-heading {
      margin-bottom: 0;
    }

    .receipt-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .receipt-mini-btn {
      min-width: 30px;
      min-height: 30px;
      padding: 6px 8px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #8290a6;
    }

    .receipt {
      min-height: 118px;
      max-height: 220px;
      overflow-y: auto;
      border: 1px dashed #ddcf83;
      background: #fff6bf;
      border-radius: 16px;
      padding: 12px 14px;
      font-family: "Courier New", monospace;
      font-size: 0.78rem;
      color: #2b2b2b;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .opti-note {
      margin: 8px 0 0;
      font-size: 0.7rem;
      color: #98a1b2;
    }

    body.dark .modal {
      background: rgba(0, 0, 0, 0.7);
    }

    body.dark .opti-calc {
      background: #171311;
      border-color: #332b27;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.48);
      color: #f6eee2;
    }

    body.dark .opti-calc .modal-head {
      background: #171311;
      border-bottom-color: #332b27;
    }

    body.dark .opti-calc .modal-head h3,
    body.dark .opti-calc .icon-btn,
    body.dark .opti-title-icon,
    body.dark .opti-heading svg {
      color: #f6eee2;
    }

    body.dark .opti {
      background: #171311;
    }

    body.dark .opti-block {
      background: #221c19;
      border-color: #352d29;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    body.dark .opti-heading,
    body.dark .opti-calc label,
    body.dark .receipt-mini-btn {
      color: #aa9f94;
    }

    body.dark .calc-shell {
      background: #2a2320;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    body.dark .display,
    body.dark .result,
    body.dark .opti-calc input,
    body.dark .opti-calc select,
    body.dark .opti-calc textarea {
      color: #f6eee2;
    }

    body.dark .opti-calc input,
    body.dark .opti-calc select,
    body.dark .opti-calc textarea {
      background: #120f0e;
      border-color: #342c28;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    body.dark .opti-calc input:focus,
    body.dark .opti-calc select:focus,
    body.dark .opti-calc textarea:focus {
      border-color: #6c5d53;
      box-shadow: 0 0 0 3px rgba(246, 238, 226, 0.08);
    }

    body.dark .opti-retail-btn,
    body.dark .key,
    body.dark .receipt-mini-btn {
      background: #120f0e;
      border-color: #342c28;
      color: #f6eee2;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.22);
    }

    body.dark .opti-retail-btn.alert {
      background: #412126;
      border-color: #63313a;
      color: #ffb5c0;
    }

    body.dark .key.op {
      background: #120f0e;
    }

    body.dark .key.eq,
    body.dark .opti-action {
      background: #f6eee2;
      color: #111111;
      border-color: #f6eee2;
    }

    body.dark .opti-block-highlight {
      background: #1d1715;
      box-shadow: inset 3px 3px 0 #c98a0b, inset -3px -3px 0 #2aaa38;
    }

    body.dark .th-visual-wrap,
    body.dark .th-canvas {
      background: #120f0e;
      border-color: #342c28;
    }

    body.dark .th-scene {
      background: #000000;
    }

          ],

        },
        {

          title: "Lined Trifocal",
          iconLabel: "TF",

            "Adds dedicated intermediate support",
            "No peripheral swim effect",
            "Reliable distance-to-near transitions"

        }
      ];

      var els = {
        body: document.body,
        searchInput: document.getElementById("searchInput"),
        categoryList: document.getElementById("categoryList"),
        mobileCategories: document.getElementById("mobileCategories"),
        contentArea: document.getElementById("contentArea"),
        themeToggle: document.getElementById("themeToggle"),
        printBtn: document.getElementById("printBtn"),
        openOptiCalc: document.getElementById("openOptiCalc"),
        optiModal: document.getElementById("optiModal"),
        closeOptiCalc: document.getElementById("closeOptiCalc")
      };

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function applyTheme() {
        if (state.isDarkMode) {
          els.body.classList.add("dark");
          els.themeToggle.textContent = "Light";
        } else {
          els.body.classList.remove("dark");
          els.themeToggle.textContent = "Dark";
        }
        localStorage.setItem("pal-dark-mode", state.isDarkMode ? "1" : "0");
      }

      function setCategory(id) {
        state.activeCategory = id;
        state.searchQuery = "";
        if (id !== "educational-materials") {
          state.educationSelectedId = null;
          state.educationColorIdx = 0;
        }
        els.searchInput.value = "";
        renderCategoryNav();
        renderContent();
      }

      function getFilteredData() {
        if (!state.searchQuery) {
          return LENS_DATA.slice();
        }
        var q = state.searchQuery.toLowerCase();
        return LENS_DATA
          .map(function (cat) {
            return {
              id: cat.id,
              title: cat.title,
              description: cat.description,
              items: cat.items.filter(function (item) {
                return item.name.toLowerCase().indexOf(q) >= 0 ||
                  (item.description || "").toLowerCase().indexOf(q) >= 0 ||
                  cat.title.toLowerCase().indexOf(q) >= 0;
              })
            };
          })
          .filter(function (cat) { return cat.items.length > 0; });
      }

      function renderCategoryNav() {
        var desktop = LENS_DATA.map(function (cat) {
          var active = state.activeCategory === cat.id;
          return "<button class=\"nav-item" + (active ? " active" : "") + "\" type=\"button\" data-cat=\"" + escapeHtml(cat.id) + "\">" +
            "<span>" + escapeHtml(cat.title) + "</span><span>›</span></button>";
        }).join("");
        desktop += "<button class=\"nav-item" + (state.activeCategory === "educational-materials" ? " active" : "") + "\" type=\"button\" data-edu=\"1\">" +
          "<span>Educational Materials</span><span>&rsaquo;</span></button>";
        els.categoryList.innerHTML = desktop;

        var mobile = LENS_DATA.map(function (cat) {
          var active = state.activeCategory === cat.id;
          return "<button class=\"chip" + (active ? " active" : "") + "\" type=\"button\" data-cat=\"" + escapeHtml(cat.id) + "\">" + escapeHtml(cat.title) + "</button>";
        }).join("") +
          "<button class=\"chip" + (state.activeCategory === "educational-materials" ? " active" : "") + "\" type=\"button\" data-cat=\"educational-materials\">Educational Materials</button>";
        els.mobileCategories.innerHTML = mobile;

        var eduDesktop = document.querySelector("[data-edu]");
        if (eduDesktop) {
          if (state.activeCategory === "educational-materials") {
            eduDesktop.classList.add("active");
          } else {
            eduDesktop.classList.remove("active");
          }
        }
      }

      function renderRows(items) {
        return items.map(function (item) {
          return "<tr><td><p class=\"item-name\">" + escapeHtml(item.name) + "</p>" +
            ((item.description ? "<p class=\"item-desc\">" + escapeHtml(item.description) + "</p>" : "")) +
            "</td><td class=\"item-price\">" + escapeHtml(item.price) + "</td></tr>";
        }).join("");
      }

      function renderLensSideProfile(edgeMm, isEnhanced) {
        var edgeHeight = Math.max(22, Math.min(54, edgeMm * 4.6));
        var centerHeight = Math.max(5, Math.min(12, edgeMm * (isEnhanced ? 0.7 : 0.9)));
        var topOuter = 50 - (edgeHeight / 2);
        var bottomOuter = 50 + (edgeHeight / 2);
        var topCenter = 50 - (centerHeight / 2);
        var bottomCenter = 50 + (centerHeight / 2);
        var sideClass = isEnhanced ? "enhanced" : "standard";

        return "<div class=\"lens-side-view " + sideClass + "\">" +
          "<p class=\"lens-side-label\">Side View</p>" +
          "<svg class=\"lens-side-svg\" viewBox=\"0 0 220 100\" aria-hidden=\"true\" focusable=\"false\">" +
          "<path d=\"M 24 " + topOuter.toFixed(1) + " Q 74 " + topOuter.toFixed(1) + " 110 " + topCenter.toFixed(1) + " Q 146 " + topOuter.toFixed(1) + " 196 " + topOuter.toFixed(1) + " L 196 " + bottomOuter.toFixed(1) + " Q 146 " + bottomOuter.toFixed(1) + " 110 " + bottomCenter.toFixed(1) + " Q 74 " + bottomOuter.toFixed(1) + " 24 " + bottomOuter.toFixed(1) + " Z\" fill=\"currentColor\" fill-opacity=\"0.28\" stroke=\"currentColor\" stroke-width=\"2.5\"/>" +
          "<path d=\"M 40 " + (topOuter + 4).toFixed(1) + " Q 82 " + (topOuter + 5).toFixed(1) + " 110 " + (topCenter + 1).toFixed(1) + "\" fill=\"none\" stroke=\"rgba(255,255,255,0.55)\" stroke-width=\"2\" stroke-linecap=\"round\"/>" +
          "<line x1=\"205\" y1=\"" + topOuter.toFixed(1) + "\" x2=\"205\" y2=\"" + bottomOuter.toFixed(1) + "\" stroke=\"currentColor\" stroke-width=\"2\"/>" +
          "<line x1=\"198\" y1=\"" + topOuter.toFixed(1) + "\" x2=\"212\" y2=\"" + topOuter.toFixed(1) + "\" stroke=\"currentColor\" stroke-width=\"2\"/>" +
          "<line x1=\"198\" y1=\"" + bottomOuter.toFixed(1) + "\" x2=\"212\" y2=\"" + bottomOuter.toFixed(1) + "\" stroke=\"currentColor\" stroke-width=\"2\"/>" +
          "<text x=\"187\" y=\"14\" font-size=\"11\" text-anchor=\"end\" fill=\"currentColor\">" + edgeMm.toFixed(1) + " mm</text>" +
          "</svg>" +
          "<p class=\"lens-side-note\">Edge thickness</p>" +
          "</div>";
      }

      function renderCategorySection(cat) {
        return "<section class=\"stack\" style=\"margin-bottom:16px;\">" +
          "<div class=\"hero card\"><p class=\"hero-kicker\">Material Info</p><h2>" + escapeHtml(cat.title) + "</h2><p>" + escapeHtml(cat.description) + "</p></div>" +
          "<table class=\"table\"><thead><tr><th>Lens Description</th><th>Price</th></tr></thead><tbody>" + renderRows(cat.items) + "</tbody></table>" +
          "</section>";
      }

      function getEduMaterial(id) {
        return EDUCATIONAL_DATA.find(function (item) { return item.id === id; }) || null;
      }

      function getEduColor(material) {
        if (!material || !material.colors || !material.colors.length) {
          return null;
        }
        var maxIdx = material.colors.length - 1;
        var idx = Math.min(maxIdx, Math.max(0, state.educationColorIdx));
        return material.colors[idx];
      }

      function renderEducationPalette(material) {
        if (!material || !material.colors || !material.colors.length) {
          return "";
        }
        var label = material.id === "ar-coating" ? "Coating Tier" : "Available Colors";
        var buttons = material.colors.map(function (color, idx) {
          var isActive = idx === state.educationColorIdx;
          return "<button class=\"edu-color-btn" + (isActive ? " active" : "") + "\" type=\"button\" data-edu-color=\"" + idx + "\">" +
            "<span class=\"edu-swatch\" style=\"background:" + escapeHtml(color.hex || "#999") + ";\"></span>" +
            "<span>" + escapeHtml(color.name || ("Option " + (idx + 1))) + "</span></button>";
        }).join("");
        return "<div class=\"stack\"><p class=\"side-title\" style=\"margin:0;\">" + escapeHtml(label) + "</p><div class=\"edu-colors\">" + buttons + "</div></div>";
      }

      function renderEducationVisual(material) {
        var color = getEduColor(material);
        var beforeImage = (color && color.image) || material.beforeImage || "./public/pal2.JPG";
        var afterImage = (color && color.image) || material.afterImage || "./public/pal2.JPG";
        var beforeLabel = material.beforeLabel || "Before";
        var afterLabel = (color && color.name) || material.afterLabel || "After";
        var beforeFilter = (color && color.beforeFilter) || material.beforeFilter || "";
        var afterFilter = (color && color.afterFilter) || material.afterFilter || "";
        var overlayColor = color && color.overlay ? color.overlay : "";
        var showHydrophobic = !!(color && color.showHydrophobic);
        var showOleophobic = !!(color && color.showOleophobic);

        if (material.visualType === "slider") {
          return "<div class=\"stack\">" +
            "<div class=\"before-after\">" +
            "<img src=\"" + escapeHtml(afterImage) + "\" alt=\"After\" style=\"filter:" + escapeHtml(afterFilter) + ";\">" +
            (overlayColor ? "<div class=\"edu-overlay\" style=\"background:" + escapeHtml(overlayColor) + ";\"></div>" : "") +
            "<div class=\"before-layer\" id=\"eduBeforeLayer\"><img src=\"" + escapeHtml(beforeImage) + "\" alt=\"Before\" style=\"filter:" + escapeHtml(beforeFilter) + ";\">" +
            (showHydrophobic ? "<div class=\"edu-water\"></div>" : "") +
            (showOleophobic ? "<div class=\"edu-smudge\"></div>" : "") +
            "</div>" +
            "<span class=\"before-label\">" + escapeHtml(beforeLabel) + "</span><span class=\"after-label\">" + escapeHtml(afterLabel) + "</span></div>" +
            "<input id=\"eduSliderRange\" class=\"ba-range\" type=\"range\" min=\"0\" max=\"100\" value=\"50\">" +
            "</div>";
        }

        if (material.visualType === "lens-comparison") {
          var isHighIndex = material.id === "high-index";
          var standardMm = isHighIndex ? 9.0 : 8.2;
          var enhancedMm = isHighIndex ? 5.0 : 5.8;
          var reductionPct = Math.round((1 - (enhancedMm / standardMm)) * 100);
          var enhancedNote = isHighIndex
            ? "High-index bends light more efficiently, so edge bulk drops significantly on stronger prescriptions."
            : "Polycarbonate is safer and noticeably slimmer than standard plastic while keeping excellent durability.";

          return "<div class=\"lens-cutaway\">" +
            "<div class=\"lens-row\"><div class=\"lens-row-head\"><span>Prescription</span><strong>" + escapeHtml(material.prescription || "-5.00D") + "</strong></div></div>" +
            "<div class=\"lens-pair\">" +
            "<div class=\"lens-card\">" +
            "<p class=\"lens-card-title\">" + escapeHtml(material.beforeLabel || "Standard Plastic") + "</p>" +
            "<div class=\"lens-face\"></div>" +
            renderLensSideProfile(standardMm, false) +
            "<p class=\"lens-mm\">Edge thickness approx " + standardMm.toFixed(1) + "mm</p>" +
            "</div>" +
            "<div class=\"lens-card\">" +
            "<p class=\"lens-card-title\">" + escapeHtml(material.afterLabel || "Enhanced") + "</p>" +
            "<div class=\"lens-face lens-face-enhanced\"></div>" +
            renderLensSideProfile(enhancedMm, true) +
            "<p class=\"lens-mm\">Edge thickness approx " + enhancedMm.toFixed(1) + "mm</p>" +
            "</div>" +
            "</div>" +
            "<div class=\"lens-delta\">Thickness reduction: <strong>" + reductionPct + "%</strong> (" + standardMm.toFixed(1) + "mm to " + enhancedMm.toFixed(1) + "mm). " + escapeHtml(enhancedNote) + "</div>" +
            "</div>";
        }

        if (material.visualType === "progressive-scene") {
          return "<div class=\"stack\">" +
            "<div class=\"scene-grid\">" +
            "<div class=\"scene-card\"><img src=\"" + escapeHtml(material.beforeImage || "./public/pal2.JPG") + "\" alt=\"Standard\"><div class=\"scene-corridor\"></div><span class=\"scene-title\">" + escapeHtml(material.beforeLabel || "Standard") + "</span><span class=\"scene-zone top\">Distance</span><span class=\"scene-zone mid\">Intermediate</span><span class=\"scene-zone bottom\">Near</span></div>" +
            "<div class=\"scene-card\"><img src=\"" + escapeHtml(material.afterImage || "./public/pal2.JPG") + "\" alt=\"Premium\"><div class=\"scene-corridor premium\"></div><span class=\"scene-title\">" + escapeHtml(material.afterLabel || "Premium") + "</span><span class=\"scene-zone top\">Distance</span><span class=\"scene-zone mid\">Intermediate</span><span class=\"scene-zone bottom\">Near</span></div>" +
            "</div>" +
            "<div class=\"edu-note\">Premium progressives widen the usable corridor and reduce side blur for intermediate and near tasks.</div></div>";
        }

        if (material.visualType === "bifocal-comparison" || material.visualType === "trifocal-comparison") {
          var isTrifocal = material.visualType === "trifocal-comparison";
          return "<div class=\"stack\"><div class=\"seg-lens\"><img src=\"" + escapeHtml(material.beforeImage || "./public/pal2.JPG") + "\" alt=\"Lined lens\">" +
            "<div class=\"seg-row distance\">Distance Zone</div>" +
            (isTrifocal ? "<div class=\"seg-row intermediate\">Intermediate Zone</div>" : "<div class=\"seg-row intermediate blur-strong\">Blurry Intermediate</div>") +
            "<div class=\"seg-row near\">Near Zone</div></div>" +
            "<div class=\"edu-note\">" +
            (isTrifocal ? "Trifocal layouts include a dedicated middle zone for computer/intermediate tasks." : "Bifocals provide clear distance and near, but intermediate tasks are less clear.") +
            "</div></div>";
        }

        if (material.visualType === "video") {
          var videoUrl = color && color.videoUrl ? color.videoUrl : "./public/trans/transgrey.mp4";
          return "<video id=\"eduVideo\" class=\"media\" src=\"" + escapeHtml(videoUrl) + "\" controls autoplay muted loop playsinline></video>";
        }

        return "<div class=\"edu-note\">No visual demo available.</div>";
      }

      function renderEducation() {
        var selectedMaterial = getEduMaterial(state.educationSelectedId);
        var cards = EDUCATIONAL_DATA.map(function (item) {
          return "<button class=\"edu-tile\" type=\"button\" data-edu-open=\"" + escapeHtml(item.id) + "\">" +
            "<span class=\"edu-icon\">" + escapeHtml(item.iconLabel || "ED") + "</span>" +
            "<h3 class=\"edu-title\">" + escapeHtml(item.title) + "</h3>" +
            "<p class=\"edu-text\">" + escapeHtml(item.description) + "</p>" +
            "<span class=\"edu-link\">Learn More &rsaquo;</span></button>";

        var html = "<section class=\"stack\">" +
          "<div class=\"hero card\"><h2>Educational Materials</h2><p>All educational lens modules from Price are included here with interactive demos and visual comparisons.</p></div>" +
          "<div class=\"edu-library\">" + cards + "</div></section>";

        els.contentArea.innerHTML = html;

        var openButtons = els.contentArea.querySelectorAll("[data-edu-open]");
        openButtons.forEach(function (btn) {
          btn.addEventListener("click", function () {

          closeButton.addEventListener("click", function () {

        var modal = document.getElementById("eduModal");
        if (modal) {

        var colorButtons = els.contentArea.querySelectorAll("[data-edu-color]");
        colorButtons.forEach(function (btn) {

        var slider = document.getElementById("eduSliderRange");

        if (eduVideo && typeof eduVideo.play === "function") {

      function renderContent() {
        if (state.activeCategory === "educational-materials") {

        if (state.searchQuery) {
          var filtered = getFilteredData();
          var head = "<div class=\"search-header\"><h3>Search Results for \"" + escapeHtml(state.searchQuery) + "\"</h3><button id=\"clearSearch\" class=\"btn\" type=\"button\">Clear</button></div>";
          if (!filtered.length) {

      function bindGlobalEvents() {

        els.themeToggle.addEventListener("click", function () {
